name: PowerShell Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Pester
        shell: powershell
        run: Install-Module Pester -MinimumVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $parseErrors = @()
          Get-ChildItem -Recurse -File -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            $parseErrors += $errors
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | Format-List
            exit 1
          }

      - name: Run tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.7.1 -Force
          $result = Invoke-Pester -Path .\Tests -PassThru
          if ($result.FailedCount -gt 0) {
            exit 1
          }
